
spring.application.name=distributed-store-coordinator
server.port=8080

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.hn.jdbc-url=jdbc:postgresql://localhost:5431/sales_db
spring.datasource.hn.username=your_db_user
spring.datasource.hn.password=your_db_password
spring.datasource.hn.driver-class-name=org.postgresql.Driver

spring.datasource.dn.jdbc-url=jdbc:postgresql://localhost:5434/sales_db
spring.datasource.dn.username=your_db_user
spring.datasource.dn.password=your_db_password
spring.datasource.dn.driver-class-name=org.postgresql.Driver

spring.datasource.hcm.jdbc-url=jdbc:postgresql://localhost:5433/sales_db
spring.datasource.hcm.username=your_db_user
spring.datasource.hcm.password=your_db_password
spring.datasource.hcm.driver-class-name=org.postgresql.Driver

spring.datasource.hn.hikari.maximum-pool-size=10
spring.datasource.dn.hikari.maximum-pool-size=10
spring.datasource.hcm.hikari.maximum-pool-size=10

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
