spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.datasource.hn.jdbc-url=jdbc:h2:mem:hn;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.hn.username=sa
spring.datasource.hn.password=
spring.datasource.hn.driver-class-name=org.h2.Driver
spring.datasource.dn.jdbc-url=jdbc:h2:mem:dn;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.dn.username=sa
spring.datasource.dn.password=
spring.datasource.dn.driver-class-name=org.h2.Driver
spring.datasource.hcm.jdbc-url=jdbc:h2:mem:hcm;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.hcm.username=sa
spring.datasource.hcm.password=
spring.datasource.hcm.driver-class-name=org.h2.Driver
spring.datasource.hn.hikari.maximum-pool-size=2
spring.datasource.dn.hikari.maximum-pool-size=2
spring.datasource.hcm.hikari.maximum-pool-size=2
